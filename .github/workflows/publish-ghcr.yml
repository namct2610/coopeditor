name: Publish GHCR Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: coopeditor-api
            dockerfile: apps/api/Dockerfile
          - image_name: coopeditor-web
            dockerfile: apps/web/Dockerfile
          - image_name: coopeditor-worker
            dockerfile: apps/worker/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Stamp release.json with the actual commit sha + built-at timestamp
      # before the Docker build picks it up. This makes the image's local
      # release manifest self-consistent: local.sha === github.sha. Without
      # this step release.json on the image has no `sha` field, so the API's
      # update-status endpoint compares only the manually-bumped `version`
      # string — which nobody remembers to bump — and the UI gets stuck on a
      # false "Cần cập nhật" banner even when the image really is current.
      - name: Stamp release.json with commit sha
        run: |
          python3 -c "
          import json, os, sys
          path = 'release.json'
          data = {}
          if os.path.exists(path):
              with open(path) as f: data = json.load(f)
          data['sha'] = '${{ github.sha }}'
          data['builtAt'] = '${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}'
          with open(path, 'w') as f: json.dump(data, f, indent=2, ensure_ascii=False)
          print(json.dumps(data, indent=2, ensure_ascii=False))
          "

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          # Multi-arch: phục vụ cả Synology Plus (amd64) lẫn ARM NAS / Raspberry Pi.
          platforms: linux/amd64,linux/arm64
          # Build args để container biết version đang chạy. Watchtower vẫn dùng image digest
          # để phát hiện update, còn BUILD_SHA dùng cho UI badge /version + /admin/update-status.
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILT_AT=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
