<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Coopeditor — Coopeditor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" />
<!-- hls.js: Chrome/Firefox/Edge không native phát HLS .m3u8. Safari thì phát
     được luôn (Mac/iOS). Library này hook vào <video> qua MSE để phát proxy. -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.20/dist/hls.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  :root, [data-theme="dark"] {
    --co-bg:#07090e; --co-chrome:#0b0e15; --co-panel:#11151e; --co-panel-2:#1b2130; --co-menu:#161b26;
    --co-text:#e9eef6; --co-text-2:#c5d0e0; --co-muted:#8896ab; --co-faint:#5d6b82; --co-comment:#d4dcea;
    --co-border:rgba(255,255,255,0.08); --co-border-2:rgba(255,255,255,0.12); --co-hover:rgba(255,255,255,0.05);
    --co-shadow:0 0 #0000; --co-accent-ink:#2da8e2;
  }
  [data-theme="light"] {
    --co-bg:#eef1f6; --co-chrome:#ffffff; --co-panel:#ffffff; --co-panel-2:#e9edf3; --co-menu:#ffffff;
    --co-text:#0a141f; --co-text-2:#2a3949; --co-muted:#44525f; --co-faint:#5a6878; --co-comment:#1b2836;
    --co-border:rgba(16,30,52,0.14); --co-border-2:rgba(16,30,52,0.22); --co-hover:rgba(16,30,52,0.05);
    --co-shadow:0 1px 2px rgba(16,30,52,0.06), 0 8px 22px rgba(16,30,52,0.08); --co-accent-ink:#136099;
  }
  body { background: var(--co-bg); color: var(--co-text); font-family: "Montserrat", system-ui, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; overflow: hidden; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #2a3344; border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }
  textarea, input { font-family: inherit; }
  button { font-family: inherit; }
  @keyframes coPulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  @keyframes coSpin { to { transform: rotate(360deg); } }

  /* ===== Mobile (≤ 760px) — stack review layout, hide secondary chrome ===== */
  @media (max-width: 760px) {
    /* App-wide: stack top bar items, allow horizontal scroll if needed */
    #app > header { padding: 0 10px !important; gap: 8px !important; overflow-x: auto; flex-wrap: nowrap; }
    #app > header [data-act="toggleSpeedPanel"] span:nth-child(2),
    #app > header [data-act="toggleSpeedPanel"] span:nth-child(3) { display: none !important; } /* drop "42 Mbps" → keep icon only */
    #app > header > button:last-of-type, /* Share button */
    #app > header > div:has(> [title]) ~ button { display: none !important; }
    /* Workspace: hide sidebar; main fills width */
    #app aside { display: none !important; }
    main { padding: 16px 12px !important; }
    h1 { font-size: 20px !important; }
    /* Projects grid: single column */
    main > div[style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
    /* Review screen: stack player above comments */
    [data-theme="dark"][style*="display:flex"][style*="min-height:0"] { flex-direction: column !important; }
    [data-theme="dark"] > aside { width: 100% !important; flex: 0 0 auto !important; max-height: 55vh; border-left: none !important; border-top: 1px solid var(--co-border); }
    /* Player frame: shrink padding */
    [data-theme="dark"] > div > div:first-child { padding: 10px !important; }
    /* Comment composer: bigger touch target */
    textarea#commentInput { min-height: 60px !important; font-size: 14px !important; }
    button[data-act="postComment"] { width: 52px !important; height: 52px !important; flex-basis: 52px !important; }
    /* Transport: bigger buttons */
    button[data-act="frameBack"], button[data-act="frameFwd"] { width: 40px !important; height: 40px !important; }
    button[data-act="togglePlay"] { width: 50px !important; height: 50px !important; }
    /* Hide volume + safe + fullscreen on mobile (rarely used) */
    [data-theme="dark"] button[title="Khung an toàn"],
    [data-theme="dark"] button[title="Khung an toàn"] + div,
    [data-theme="dark"] svg[viewBox="0 0 24 24"][stroke-width="2"]:has(polyline[points="15 3 21 3 21 9"]) { display: none; }
    /* Quality menu: full width on mobile */
    [data-theme="dark"] div[style*="position:absolute"][style*="bottom:calc(100% + 8px)"] { width: 92vw !important; right: -6px !important; }
    /* Modals: full screen */
    div[data-act="closeMembers"] > div,
    div[data-act="closeAudit"] > div,
    div[data-act="closeImport"] > div,
    div[data-act="closeTranscode"] > div { max-height: 100vh !important; max-width: 100vw !important; width: 100vw !important; border-radius: 0 !important; }
  }
  .co-hover:hover { background: var(--co-hover) !important; }
  .co-border-hover:hover { border-color: rgba(45,168,226,0.5) !important; }
  .co-border-hover-strong:hover { border-color: rgba(45,168,226,0.45) !important; transform: translateY(-3px); }
  .co-btn-blue:hover { background:#4fade4 !important; }
  .co-text-hover:hover { color: var(--co-text) !important; }
  .co-blue-hover:hover { color: #2da8e2 !important; }
  .co-attach-hover:hover { background: rgba(255,255,255,0.12) !important; }
  textarea:focus { border-color: rgba(45,168,226,0.6) !important; }
</style>
</head>
<body>
<div id="app">
  <!-- Boot loading state: rendered immediately so the page is never blank while bootstrap fetches /setup/status + /me.
       Replaced by render() once bootstrap completes. Without this, slow API startup (postgres healthcheck, cold container)
       leaves users staring at a black screen for 20-40s and they think the app crashed. -->
  <div style="position:fixed;inset:0;background:#07090e;display:grid;place-items:center;color:#8896ab;font-family:system-ui,-apple-system,sans-serif;">
    <div style="text-align:center;max-width:320px;padding:24px;">
      <div style="width:48px;height:48px;border:3px solid #1c2536;border-top-color:#2da8e2;border-radius:50%;animation:coSpin 1s linear infinite;margin:0 auto 16px;"></div>
      <div style="font-size:14px;font-weight:600;">Đang khởi động Coopeditor…</div>
      <div id="bootHint" style="margin-top:10px;font-size:11px;color:#5d6b82;font-weight:500;">Kết nối tới máy chủ…</div>
    </div>
  </div>
</div>
<script>
"use strict";

const PAL = [["#0c2436","#1c5876"],["#2a1d0c","#7a521d"],["#0c1c33","#234a78"],["#15171c","#3a4453"],["#291230","#6e2a55"],["#241a0e","#7a5524"],["#102b2b","#1f5a52"],["#1a1430","#3a2f6e"]];

const PROJECTS = [];
const EMPTY_SOURCES = {};
const AUTHORS = {
  me: { name: "Bạn", initial: "B", color: "#2da8e2", role: "" },
  guest: { name: "Khách", initial: "K", color: "#35c389", role: "CLIENT" },
};

const SM = {
  progress: { label: "Đang thực hiện", color: "#2da8e2", bg: "rgba(45,168,226,0.13)" },
  done: { label: "Đã xong", color: "#35c389", bg: "rgba(53,195,137,0.13)" },
  published: { label: "Đã đăng", color: "#a07bff", bg: "rgba(160,123,255,0.13)" },
};

const SRC_STATUS = {
  ready: { label: "Sẵn sàng", color: "#35c389", bg: "rgba(53,195,137,0.13)" },
  processing: { label: "Transcode", color: "#f5a623", bg: "rgba(245,166,35,0.13)" },
  pending: { label: "Chờ proxy", color: "#8896ab", bg: "var(--co-border)" },
  failed: { label: "Lỗi", color: "#ef4d57", bg: "rgba(239,77,87,0.13)" },
};

const SCENES = [
  { at: 0, label: "INT · KITCHEN — DAY", sub: "01 · Wide establishing", a: "#0c2436", b: "#1c5876", hi: "rgba(45,168,226,.5)" },
  { at: 16000, label: "CU · GLASS FILLING", sub: "02 · Insert", a: "#2a1d0c", b: "#7a521d", hi: "rgba(245,166,35,.45)" },
  { at: 38000, label: "INT · KITCHEN — DAY", sub: "03 · Two shot", a: "#0c1c33", b: "#234a78", hi: "rgba(80,150,220,.42)" },
  { at: 62000, label: "INSERT · FILTER UNIT", sub: "04 · Macro", a: "#15171c", b: "#3a4453", hi: "rgba(170,190,210,.35)" },
  { at: 88000, label: "EXT · BALCONY — DUSK", sub: "05 · Wide", a: "#291230", b: "#6e2a55", hi: "rgba(224,114,168,.42)" },
  { at: 114000, label: "CU · SMILE", sub: "06 · Close", a: "#241a0e", b: "#7a5524", hi: "rgba(245,200,120,.4)" },
];

const EMPTY_VERSIONS = [];

let savedTheme = "dark";
try { const t = localStorage.getItem("co-theme"); if (t === "light" || t === "dark") savedTheme = t; } catch (_) {}
document.documentElement.setAttribute("data-theme", savedTheme);

const state = {
  view: "projects",
  theme: savedTheme,
  statusFilter: "all",
  selectedProjectId: "",
  sourceView: "grid",
  dragId: null,
  showStatusMenu: false,
  projectStatus: {},
  sourcesByProject: EMPTY_SOURCES,
  selectedId: "",
  playing: false,
  currentMs: 12330,
  duration: 142000,
  fps: 24,
  // "source" = play original NAS file directly (no transcode wait). User can
  // still pick a proxy ladder rung from the quality menu.
  quality: "source",
  filter: "open",
  newComment: "",
  attachTc: true,
  // Safe-area overlay cycles: off → 16:9 (action+title safe) → 9:16 (vertical short/reel) → 1:1 (square)
  safeAspect: "off",
  showQualityMenu: false,
  showVersionMenu: false,
  showMembers: false,
  showAudit: false,
  showArchived: false,
  auditEntries: [],
  annotationMode: false,
  annotationTool: "pen",
  annotationColor: "#ef4d57",
  annotationStrokes: [],
  annotationDrawing: null,
  showTranscode: false,
  showImport: false,
  showUpdateModal: false,
  // Create-project modal (replaces the old window.prompt pair). Thumbnail is
  // optional — user can skip and add later from the project detail page.
  showCreateProject: false,
  createProjectName: "",
  createProjectClient: "",
  createProjectThumbDataUrl: "",
  createProjectBusy: false,
  createProjectError: "",
  nasCurrentPath: "/",
  nasLoading: false,
  nasError: "",
  workspaceSearch: "",
  clientFilter: "all",
  inviteUserId: "",
  inviteRole: "reviewer",
  commentMenuId: null,
  editingCommentId: null,
  editingCommentText: "",
  notificationsByProject: {},
  nasPath: [],
  importSel: {},
  speedMbps: 42,
  speedDisplay: 42,
  speedTesting: false,
  showSpeedPanel: false,
  updateStatus: null,
  updateBusy: false,
  updateTriggerBusy: false,
  updateMessage: "",
  updateError: "",
  // Auto-ABR is opt-in: by default we keep the user on "Bản gốc" so they see
  // the real video on day one and never run into the proxy-pending modal.
  autoQualityEnabled: false,
  lastAutoQuality: "source",
  version: "v1",
  qualities: [
    { id: "540p", label: "540p", res: "960×540", bitrate: "1.8 Mbps", sub: "Mạng yếu · nhiều người xem", status: "ready" },
    { id: "720p", label: "720p", res: "1280×720", bitrate: "3.5 Mbps", sub: "Mặc định review", status: "ready" },
    { id: "1080p", label: "1080p", res: "1920×1080", bitrate: "8 Mbps", sub: "Check chi tiết · cần mạng tốt", status: "pending", progress: 0 },
  ],
  comments: [],
};

// timers
let playTimer = null, lastTick = 0;
let speedTimer = null;

function setState(patch) { Object.assign(state, patch); render(); }
function effStatus(p) { if (!p) return "progress"; return state.projectStatus[p.id] || p.status; }

function fmtDur(ms) { const s = Math.floor(ms / 1000); const m = Math.floor(s / 60), ss = s % 60; return m + ":" + String(ss).padStart(2, "0"); }
function fmtTc(ms) {
  const fps = state.fps; let frames = Math.round((ms / 1000) * fps);
  const ff = frames % fps; let total = Math.floor(frames / fps);
  const ss = total % 60; total = Math.floor(total / 60);
  const mm = total % 60; const hh = Math.floor(total / 60);
  const p = (n) => String(n).padStart(2, "0");
  return p(hh) + ":" + p(mm) + ":" + p(ss) + ":" + p(ff);
}
function sceneAt(ms) {
  let cur = SCENES[0], idx = 0;
  for (let i = 0; i < SCENES.length; i++) { if (SCENES[i].at <= ms) { cur = SCENES[i]; idx = i; } }
  const next = SCENES[idx + 1];
  const span = (next ? next.at : state.duration) - cur.at;
  const prog = span > 0 ? Math.max(0, Math.min(1, (ms - cur.at) / span)) : 0;
  return { cur, prog };
}
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function selectedSource() {
  const allSources = Object.values(state.sourcesByProject).flat();
  return allSources.find((x) => x.id === state.selectedId) || allSources[0] || null;
}

function syncPlayButtons(isPlaying) {
  document.querySelectorAll("[data-role='play-toggle']").forEach((node) => {
    node.innerHTML = isPlaying ? ICON.pauseBtn : ICON.playBtn;
  });
  const overlay = document.getElementById("reviewVideoOverlay");
  if (overlay) {
    overlay.style.display = isPlaying ? "none" : "grid";
    overlay.innerHTML = isPlaying ? "" : `<div style="width:76px;height:76px;border-radius:50%;background:rgba(7,9,14,0.55);backdrop-filter:blur(6px);display:grid;place-items:center;border:1.5px solid rgba(255,255,255,0.3);box-shadow:0 8px 30px rgba(0,0,0,0.5);">${ICON.bigPlay}</div>`;
  }
}

function syncPlaybackUi() {
  const currentNode = document.getElementById("reviewTcCurrent");
  const inlineCurrentNode = document.getElementById("reviewTcCurrentInline");
  const durationNode = document.getElementById("reviewTcDuration");
  const frameNode = document.getElementById("reviewFrameNumber");
  const playBar = document.getElementById("reviewPlayPct");
  const bufferBar = document.getElementById("reviewBufferedPct");
  const needle = document.getElementById("reviewNeedle");
  const attachLabel = document.getElementById("commentAttachLabel");
  const playPct = state.duration > 0 ? Math.max(0, Math.min(100, (state.currentMs / state.duration) * 100)) : 0;
  if (currentNode) currentNode.textContent = fmtTc(state.currentMs);
  if (inlineCurrentNode) inlineCurrentNode.textContent = fmtTc(state.currentMs);
  if (durationNode) durationNode.textContent = fmtTc(state.duration);
  if (frameNode) frameNode.textContent = "F " + Math.round((state.currentMs / 1000) * state.fps);
  if (playBar) playBar.style.width = playPct + "%";
  if (bufferBar) bufferBar.style.width = Math.min(100, playPct + 16) + "%";
  if (needle) needle.style.left = playPct + "%";
  if (attachLabel) attachLabel.textContent = "Gắn @ " + fmtTc(state.currentMs);
}

// hls.js wrapper: native <video src=…m3u8> only works in Safari. Everywhere
// else we need hls.js attached to the element via MSE. We swap the instance
// when the src changes (e.g. user picks a different rendition rung).
let _activeHls = null;
function attachHlsIfNeeded(video) {
  if (!video) return;
  const url = video.getAttribute("src") || "";
  const isHls = /\.m3u8(\?|$)/i.test(url);
  if (!isHls) {
    if (_activeHls) { try { _activeHls.destroy(); } catch (_) {} _activeHls = null; video.removeAttribute("data-hls"); }
    return;
  }
  // Safari can play HLS natively — skip hls.js to keep things simple.
  if (video.canPlayType("application/vnd.apple.mpegurl")) return;
  if (typeof Hls === "undefined" || !Hls.isSupported()) return;
  // If hls.js is already wired to this exact URL, leave it alone.
  if (video.dataset.hls === url) return;
  if (_activeHls) { try { _activeHls.destroy(); } catch (_) {} _activeHls = null; }
  video.removeAttribute("src"); // hls.js drives the source from here on
  _activeHls = new Hls({
    // Send credentials so the API session cookie reaches /api/hls/* segment fetches.
    xhrSetup: (xhr) => { xhr.withCredentials = true; },
    enableWorker: true,
    lowLatencyMode: false,
  });
  _activeHls.loadSource(url);
  _activeHls.attachMedia(video);
  video.dataset.hls = url;
  _activeHls.on(Hls.Events.ERROR, (_e, data) => {
    if (data && data.fatal) console.warn("[hls.js] fatal", data.type, data.details);
  });
}

function bindReviewVideo() {
  const video = document.getElementById("reviewVideo");
  if (!video) {
    syncPlaybackUi();
    syncPlayButtons(state.playing);
    return;
  }
  // Always re-check HLS attachment because render() rebuilds the DOM but the
  // <video> may be the same element with a new src.
  attachHlsIfNeeded(video);
  if (video.dataset.bound === "1") {
    syncPlaybackUi();
    syncPlayButtons(state.playing);
    return;
  }
  video.dataset.bound = "1";
  const updateFromVideo = () => {
    state.currentMs = Math.round((video.currentTime || 0) * 1000);
    if (Number.isFinite(video.duration) && video.duration > 0) state.duration = Math.round(video.duration * 1000);
    state.playing = !video.paused;
    syncPlaybackUi();
    syncPlayButtons(state.playing);
  };
  video.addEventListener("loadedmetadata", updateFromVideo);
  video.addEventListener("timeupdate", updateFromVideo);
  video.addEventListener("seeked", updateFromVideo);
  video.addEventListener("play", updateFromVideo);
  video.addEventListener("pause", updateFromVideo);
  video.addEventListener("ended", updateFromVideo);
  if (state.currentMs > 0) {
    try { video.currentTime = state.currentMs / 1000; } catch (_) {}
  }
  updateFromVideo();
}

// ---- navigation ----
function goProjects() { pause(); setState({ view: "projects", showQualityMenu: false, showVersionMenu: false, showTranscode: false, showImport: false, showStatusMenu: false }); }
function openProject(pid) { pause(); setState({ view: "project", selectedProjectId: pid, showStatusMenu: false }); }
function openSource(id) {
  pause();
  const pid = state.selectedProjectId;
  const src = ((state.sourcesByProject[pid] || []).find((item) => item.id === id)) || null;
  setState({ view: "review", selectedId: id, currentMs: 0, duration: src && src.dur ? src.dur : state.duration, playing: false });
}
function setStatusFilter(key) { setState({ statusFilter: key, view: "projects" }); }
function toggleTheme() { const t = state.theme === "dark" ? "light" : "dark"; try { localStorage.setItem("co-theme", t); } catch (_) {} setState({ theme: t }); }

// ---- reorder ----
function dragStart(id, e) { state.dragId = id; if (e && e.dataTransfer) { e.dataTransfer.effectAllowed = "move"; try { e.dataTransfer.setData("text/plain", id); } catch (_) {} } render(); }
function dragOver(e) { if (e) e.preventDefault(); }
function dragEnter(id) { if (!state.dragId || state.dragId === id) return; reorder(state.dragId, id); }
function dragEnd() { state.dragId = null; render(); }
function reorder(fromId, toId) {
  const pid = state.selectedProjectId;
  const arr = [...(state.sourcesByProject[pid] || [])];
  const from = arr.findIndex((x) => x.id === fromId);
  const to = arr.findIndex((x) => x.id === toId);
  if (from < 0 || to < 0 || from === to) return;
  arr.splice(to, 0, arr.splice(from, 1)[0]);
  state.sourcesByProject = { ...state.sourcesByProject, [pid]: arr };
  render();
}
function moveBy(id, dir) {
  const pid = state.selectedProjectId;
  const arr = [...(state.sourcesByProject[pid] || [])];
  const i = arr.findIndex((x) => x.id === id);
  const j = i + dir;
  if (i < 0 || j < 0 || j >= arr.length) return;
  [arr[i], arr[j]] = [arr[j], arr[i]];
  setState({ sourcesByProject: { ...state.sourcesByProject, [pid]: arr } });
}

// ---- playback ----
function startTimer() {
  const video = document.getElementById("reviewVideo");
  if (video) return;
  clearInterval(playTimer);
  lastTick = performance.now();
  playTimer = setInterval(() => {
    const now = performance.now();
    const dt = now - lastTick; lastTick = now;
    let c = state.currentMs + dt; if (c >= state.duration) c = 0;
    state.currentMs = c;
    render();
  }, 33);
}
function togglePlay() {
  const video = document.getElementById("reviewVideo");
  if (video) {
    if (video.paused) video.play().catch(() => {});
    else video.pause();
    return;
  }
  const p = !state.playing;
  state.playing = p;
  if (p) startTimer(); else clearInterval(playTimer);
  render();
}
function pause() {
  clearInterval(playTimer);
  const video = document.getElementById("reviewVideo");
  if (video && !video.paused) video.pause();
  state.playing = false;
  syncPlayButtons(false);
}
function frameFwd() {
  const video = document.getElementById("reviewVideo");
  if (video) {
    video.pause();
    video.currentTime = Math.min(video.duration || (state.duration / 1000), (video.currentTime || 0) + (1 / state.fps));
    return;
  }
  pause();
  setState({ currentMs: Math.min(state.duration, state.currentMs + 1000 / state.fps) });
}
function frameBack() {
  const video = document.getElementById("reviewVideo");
  if (video) {
    video.pause();
    video.currentTime = Math.max(0, (video.currentTime || 0) - (1 / state.fps));
    return;
  }
  pause();
  setState({ currentMs: Math.max(0, state.currentMs - 1000 / state.fps) });
}
function seekBy(ms) {
  const video = document.getElementById("reviewVideo");
  if (video) {
    video.currentTime = Math.max(0, Math.min(video.duration || (state.duration / 1000), (video.currentTime || 0) + (ms / 1000)));
    return;
  }
  setState({ currentMs: Math.max(0, Math.min(state.duration, state.currentMs + ms)) });
}
function jumpTo(ms) {
  const video = document.getElementById("reviewVideo");
  if (video) {
    video.pause();
    video.currentTime = Math.max(0, Math.min(video.duration || (state.duration / 1000), ms / 1000));
    return;
  }
  pause();
  setState({ currentMs: ms });
}
function seekFromEvent(e) {
  const r = e.currentTarget.getBoundingClientRect();
  let p = (e.clientX - r.left) / r.width;
  p = Math.max(0, Math.min(1, p));
  const video = document.getElementById("reviewVideo");
  if (video) {
    video.currentTime = p * (video.duration || (state.duration / 1000) || 0);
  } else {
    setState({ currentMs: p * state.duration });
  }
  startScrubFromEvent(e);
}

// Drag-to-scrub: while the mouse is held down on the seek bar we keep
// updating video.currentTime. We re-resolve the bar's rect on each move
// (in case the page re-rendered) but pin to the original bar via closure.
function startScrubFromEvent(e) {
  const bar = e.currentTarget && e.currentTarget.closest ? e.currentTarget.closest('[data-act="seekFromEvent"]') : null;
  if (!bar) return;
  let scrubbing = true;
  const move = (ev) => {
    if (!scrubbing) return;
    const rect = bar.getBoundingClientRect();
    const clientX = ev.touches && ev.touches[0] ? ev.touches[0].clientX : ev.clientX;
    let p = (clientX - rect.left) / rect.width;
    p = Math.max(0, Math.min(1, p));
    const video = document.getElementById("reviewVideo");
    const dur = video ? (video.duration || state.duration / 1000) : state.duration / 1000;
    const tMs = p * dur * 1000;
    if (video) video.currentTime = p * dur;
    // Update needle inline without a full re-render to keep scrub at 60fps.
    const needle = document.getElementById("reviewNeedle");
    const playBar = document.getElementById("reviewPlayPct");
    const tcA = document.getElementById("reviewTcCurrent");
    const tcB = document.getElementById("reviewTcCurrentInline");
    if (needle) needle.style.left = (p * 100) + "%";
    if (playBar) playBar.style.width = (p * 100) + "%";
    if (tcA) tcA.textContent = fmtTc(tMs);
    if (tcB) tcB.textContent = fmtTc(tMs);
    state.currentMs = tMs;
  };
  const up = () => {
    scrubbing = false;
    window.removeEventListener("mousemove", move);
    window.removeEventListener("mouseup", up);
    window.removeEventListener("touchmove", move);
    window.removeEventListener("touchend", up);
    // One final render to settle marker/comment highlights.
    render();
  };
  window.addEventListener("mousemove", move);
  window.addEventListener("mouseup", up);
  window.addEventListener("touchmove", move, { passive: true });
  window.addEventListener("touchend", up);
}

// ---- transcode ----
function recommendedQualityForMbps(speedVal) {
  return speedVal >= 40 ? "1080p" : speedVal >= 22 ? "720p" : "540p";
}
function bestAvailableQuality(targetId) {
  const order = ["1080p", "720p", "540p"];
  const start = Math.max(0, order.indexOf(targetId));
  for (let i = start; i < order.length; i++) {
    const q = state.qualities.find((x) => x.id === order[i]);
    if (q && q.status === "ready") return q.id;
  }
  return (state.qualities.find((x) => x.status === "ready") || state.qualities[0] || {}).id || state.quality;
}
function applyAutoQualityRecommendation(speedVal) {
  const best = bestAvailableQuality(recommendedQualityForMbps(speedVal));
  if (!best) return;
  state.lastAutoQuality = best;
  if (state.quality !== best) setQuality(best, { manual: false });
}
function setQuality(id, opts) {
  const config = opts || {};
  // "source" is a synthetic quality meaning "play original NAS file" — always
  // ready, never needs a transcode job.
  if (id === "source") {
    const patch = { quality: "source", showQualityMenu: false, showSpeedPanel: false };
    if (config.manual !== false) patch.autoQualityEnabled = false;
    return setState(patch);
  }
  const q = state.qualities.find((x) => x.id === id);
  if (q && q.status === "ready") {
    const patch = { quality: id, showQualityMenu: false, showSpeedPanel: false };
    if (config.manual !== false) patch.autoQualityEnabled = false;
    else state.lastAutoQuality = id;
    setState(patch);
  }
  else if (q && q.status === "pending") {
    requestTranscode(id);
    setState({ showQualityMenu: false, showTranscode: true, showSpeedPanel: false, autoQualityEnabled: config.manual === false ? state.autoQualityEnabled : false });
  }
  else setState({ showQualityMenu: false, showTranscode: true });
}
function requestTranscode(id) {
  state.qualities = state.qualities.map((q) => q.id === id ? { ...q, status: "processing", progress: q.progress || 0 } : q);
  render();
}

// ---- speed ----
async function measureSpeedMbps() {
  // Throughput test designed for gigabit-class NAS (target: ±5% accuracy at 1 Gbps).
  //
  // Why the simpler "sequential single fetch" doesn't work at 1 Gbps:
  //   - A 1 GbE link delivers ~118 MB/s steady-state. An 8 MB segment finishes
  //     in ~70 ms, of which ~30-50 ms is TCP slow-start + HTTP overhead, so
  //     the measured throughput reads ~50% of true bandwidth.
  //   - Single-stream HTTP over Caddy + Tailscale rarely saturates the link;
  //     parallel connections are needed to fill the pipe.
  //
  // Method:
  //   1. WARMUP — open N parallel streams, pull a small payload to grow TCP
  //      congestion windows + warm Caddy's reverse-proxy connection pool.
  //   2. MEASURE — open N parallel streams pulling LARGE payloads in parallel.
  //      Time the wall clock from "all started" to "all finished", compute
  //      throughput = totalBytes * 8 / elapsedSec.
  //   3. Repeat MEASURE for ~12-15 s of steady-state samples, then trim the
  //      slowest 30% (warmup tail + GC blips) and average the rest.
  if (!API_BASE || !remote.me) return null;
  const PARALLEL = 4;                   // 4 streams typically saturate gigabit through 1 reverse proxy
  const PER_STREAM_MB = 32;             // 32 MiB × 4 = 128 MiB per round, ~1 s at 1 Gbps
  const ROUND_SIZE = PER_STREAM_MB * 1024 * 1024;
  const TOTAL_BUDGET_MS = 15_000;       // overall wall-clock budget
  const WARMUP_BUDGET_MS = 1_500;

  async function fetchAndDrain(size) {
    const res = await fetch(API_BASE + "/speedtest/segment?size=" + size + "&ts=" + Date.now() + "-" + Math.random(), {
      credentials: "include",
      cache: "no-store",
    });
    if (!res.ok) throw new Error("speedtest_failed_" + res.status);
    // Stream-read so the browser doesn't buffer the whole response in memory
    // (32 MiB × 4 = 128 MiB peak otherwise). reader.read() yields chunks as
    // the network delivers them, and we just discard.
    const reader = res.body && res.body.getReader ? res.body.getReader() : null;
    if (reader) {
      let bytes = 0;
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        bytes += value ? value.byteLength : 0;
      }
      return bytes;
    }
    const buf = await res.arrayBuffer();
    return buf.byteLength;
  }

  // ---- 1. Warmup ----
  const warmupStart = performance.now();
  while (performance.now() - warmupStart < WARMUP_BUDGET_MS) {
    try {
      await Promise.all(Array.from({ length: PARALLEL }, () => fetchAndDrain(1024 * 1024)));
    } catch (e) { return null; }
  }

  // ---- 2. Measurement rounds ----
  const samplesMbps = [];
  const startMeasure = performance.now();
  while (performance.now() - startMeasure < TOTAL_BUDGET_MS - WARMUP_BUDGET_MS) {
    const t0 = performance.now();
    let bytesTotal = 0;
    try {
      const results = await Promise.all(Array.from({ length: PARALLEL }, () => fetchAndDrain(ROUND_SIZE)));
      bytesTotal = results.reduce((a, b) => a + b, 0);
    } catch (e) { break; }
    const elapsedSec = (performance.now() - t0) / 1000;
    if (elapsedSec <= 0 || bytesTotal <= 0) continue;
    const mbps = (bytesTotal * 8) / elapsedSec / 1_000_000;
    samplesMbps.push(mbps);
    // Show rolling reading while the test progresses (smoother UI than per-sample jitter).
    const recent = samplesMbps.slice(-3);
    const avg = recent.reduce((a, b) => a + b, 0) / recent.length;
    state.speedDisplay = Math.max(1, Math.round(avg));
    render();
  }
  if (!samplesMbps.length) return null;
  // Trim slowest 30% to remove warmup tail / GC blips, then average.
  const sorted = samplesMbps.slice().sort((a, b) => a - b);
  const trimmed = sorted.slice(Math.floor(sorted.length * 0.3));
  const final = trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
  return Math.max(1, Math.round(final));
}

// Format Mbps for display: ≥1000 → "1.2 Gbps", else "240 Mbps".
function formatSpeedValue(mbps) {
  if (mbps >= 1000) return { value: (mbps / 1000).toFixed(mbps >= 10000 ? 0 : 1), unit: "Gbps" };
  return { value: String(Math.round(mbps)), unit: "Mbps" };
}
async function runSpeedTest() {
  if (state.speedTesting) return;
  state.speedTesting = true;
  clearInterval(speedTimer);
  speedTimer = null;
  render();
  let final = null;
  try {
    final = await measureSpeedMbps();
  } catch (_) {}
  state.speedTesting = false;
  if (final != null) {
    state.speedMbps = final;
    state.speedDisplay = final;
    if (state.autoQualityEnabled) applyAutoQualityRecommendation(final);
  }
  render();
}

// Safe-area overlay — supports horizontal (16:9 review masters), vertical
// short/reel (9:16), and square (1:1). For 9:16 and 1:1 the container is
// 16:9 so we draw a centered crop rectangle of the target ratio plus the
// usual inner safe margins (5% title-safe, 10% action-safe) inside that crop.
function safeAreaOverlay(aspect) {
  if (!aspect || aspect === "off") return "";
  if (aspect === "16:9") {
    return `
      <div style="position:absolute;inset:10%;border:1px solid rgba(255,255,255,0.4);pointer-events:none;"></div>
      <div style="position:absolute;inset:5%;border:1px solid rgba(255,255,255,0.2);pointer-events:none;"></div>
      <div style="position:absolute;left:8px;bottom:calc(7.5% + 4px);background:rgba(0,0,0,0.55);color:#fff;font-weight:800;font-size:10px;letter-spacing:0.08em;padding:3px 7px;border-radius:5px;pointer-events:none;">SAFE 16:9</div>`;
  }
  // For 9:16 inside a 16:9 frame, target width = container height * (9/16).
  // For 1:1, target width = container height.
  // We use aspect-ratio CSS on a centered child so the math stays correct
  // regardless of player width.
  const ratio = aspect === "9:16" ? "9 / 16" : "1 / 1";
  const label = aspect === "9:16" ? "SAFE 9:16 (short / reel)" : "SAFE 1:1 (square)";
  return `
    <div style="position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;">
      <div style="height:100%;aspect-ratio:${ratio};position:relative;outline:1.5px solid rgba(45,168,226,0.7);background:rgba(0,0,0,0.18);">
        <div style="position:absolute;inset:6%;border:1px solid rgba(255,255,255,0.4);"></div>
        <div style="position:absolute;inset:3%;border:1px solid rgba(255,255,255,0.2);"></div>
        <div style="position:absolute;left:6px;top:6px;background:rgba(45,168,226,0.85);color:#07111a;font-weight:800;font-size:10px;letter-spacing:0.08em;padding:3px 7px;border-radius:5px;">${label}</div>
      </div>
    </div>`;
}

// ---- Annotation: SVG overlay + toolbar -----------------------------------
// Coordinates stored 0..1 (normalized) so annotations survive any scaling.
// On comment submit, state.annotationStrokes is shipped với body.annotation.
function annotationToolbar() {
  if (state.view !== "review") return "";
  const active = !!state.annotationMode;
  const tool = state.annotationTool || "pen";
  const color = state.annotationColor || "#ef4d57";
  const colors = ["#ef4d57", "#f5a623", "#35c389", "#2da8e2", "#a07bff", "#ffffff"];
  const tools = [{ id: "pen", label: "✎ Vẽ" }, { id: "arrow", label: "→ Mũi tên" }, { id: "rect", label: "▭ Khung" }];
  const strokeCount = (state.annotationStrokes || []).length;
  return `
    <div style="display:flex;align-items:center;gap:8px;margin-top:8px;padding:6px 10px;background:var(--co-panel-2);border:1px solid var(--co-border-2);border-radius:10px;flex-wrap:wrap;">
      <button data-act="toggleAnnotationMode" class="co-border-hover" title="Bật/tắt chế độ vẽ chú thích trên khung hình" style="display:inline-flex;align-items:center;gap:6px;background:${active ? "#ef4d57" : "transparent"};color:${active ? "#fff" : "var(--co-text-2)"};border:1px solid ${active ? "#ef4d57" : "var(--co-border-2)"};font-weight:700;font-size:12px;padding:6px 11px;border-radius:8px;cursor:pointer;">
        ${active ? "● Đang vẽ" : "✎ Vẽ chú thích"}
      </button>
      ${active ? `
        ${tools.map((t) => `<button data-act="setAnnotationTool" data-arg="${t.id}" style="background:${tool === t.id ? "#2da8e2" : "transparent"};color:${tool === t.id ? "#07111a" : "var(--co-text-2)"};border:1px solid ${tool === t.id ? "#2da8e2" : "var(--co-border-2)"};font-weight:700;font-size:12px;padding:6px 9px;border-radius:7px;cursor:pointer;">${t.label}</button>`).join("")}
        <span style="display:inline-flex;gap:4px;align-items:center;padding:0 4px;">
          ${colors.map((c) => `<button data-act="setAnnotationColor" data-arg="${encodeURIComponent(c)}" title="${c}" style="width:22px;height:22px;border-radius:50%;background:${c};border:2px solid ${c === color ? "#fff" : "transparent"};cursor:pointer;box-shadow:0 0 0 1px rgba(0,0,0,0.3);"></button>`).join("")}
        </span>
        <span style="color:var(--co-muted);font-size:11.5px;font-weight:600;margin-left:auto;">${strokeCount} nét — sẽ gửi cùng comment tiếp theo</span>
        <button data-act="clearAnnotation" style="background:transparent;color:#ef4d57;border:1px solid rgba(239,77,87,0.3);font-weight:700;font-size:12px;padding:6px 9px;border-radius:7px;cursor:pointer;">Xóa</button>
      ` : ""}
    </div>`;
}

function annotationOverlay() {
  const strokes = state.annotationStrokes || [];
  const drawing = state.annotationDrawing;
  const all = drawing ? [...strokes, drawing] : strokes;
  // z-index:40 keeps the SVG ABOVE the video poster + play-button overlay
  // (which sit on the same stacking context). Without this the canvas got
  // covered by the controls and felt "sunk".
  return `
    <svg id="annotationSvg" viewBox="0 0 1 1" preserveAspectRatio="none" style="position:absolute;inset:0;cursor:crosshair;touch-action:none;z-index:40;pointer-events:auto;"
         onpointerdown="window.__annPtr&&window.__annPtr('down',event)"
         onpointermove="window.__annPtr&&window.__annPtr('move',event)"
         onpointerup="window.__annPtr&&window.__annPtr('up',event)"
         onpointercancel="window.__annPtr&&window.__annPtr('up',event)"
         onpointerleave="window.__annPtr&&window.__annPtr('up',event)">
      ${all.map((s) => renderStrokeSvg(s)).join("")}
    </svg>`;
}

function renderStrokeSvg(s) {
  if (!s || !s.points || s.points.length < 1) return "";
  const c = s.color || "#ef4d57";
  const sw = 0.004; // stroke width in normalized units (~ 4px on 1080p frame)
  if (s.tool === "rect" && s.points.length >= 2) {
    const a = s.points[0], b = s.points[s.points.length - 1];
    const x = Math.min(a[0], b[0]), y = Math.min(a[1], b[1]);
    const w = Math.abs(b[0] - a[0]), h = Math.abs(b[1] - a[1]);
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="none" stroke="${c}" stroke-width="${sw}" vector-effect="non-scaling-stroke" />`;
  }
  if (s.tool === "arrow" && s.points.length >= 2) {
    const a = s.points[0], b = s.points[s.points.length - 1];
    const id = "arrh-" + Math.round(Math.random() * 100000);
    return `<defs><marker id="${id}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="${c}"/></marker></defs>
      <line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="${c}" stroke-width="${sw}" marker-end="url(#${id})" vector-effect="non-scaling-stroke" />`;
  }
  // pen — free draw polyline
  const pts = s.points.map((p) => p[0] + "," + p[1]).join(" ");
  return `<polyline points="${pts}" fill="none" stroke="${c}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" />`;
}

// Pointer event handler — module-scope so the SVG inline attributes can hit it.
// IMPORTANT perf note: a naive render() per pointermove rebuilds the entire app
// DOM (~3k lines of innerHTML) every ~10ms while drawing — the cause of the
// "vẽ chú thích rất lag" complaint. We avoid full render during drag by
// patching only the SVG's innerHTML; the full render() runs once on
// pointerdown (to swap the play-overlay → annotation SVG) and once on
// pointerup (to commit the stroke into state.annotationStrokes and update
// the toolbar counter).
function repaintAnnotationSvg() {
  const svg = document.getElementById("annotationSvg");
  if (!svg) return;
  const strokes = state.annotationStrokes || [];
  const drawing = state.annotationDrawing;
  const all = drawing ? [...strokes, drawing] : strokes;
  svg.innerHTML = all.map((s) => renderStrokeSvg(s)).join("");
}

let _annRafQueued = false;
function requestAnnRepaint() {
  if (_annRafQueued) return;
  _annRafQueued = true;
  requestAnimationFrame(() => { _annRafQueued = false; repaintAnnotationSvg(); });
}

window.__annPtr = function (phase, ev) {
  if (!state.annotationMode) return;
  const svg = ev.currentTarget;
  const rect = svg.getBoundingClientRect();
  const x = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width));
  const y = Math.max(0, Math.min(1, (ev.clientY - rect.top) / rect.height));
  if (phase === "down") {
    state.annotationDrawing = { tool: state.annotationTool, color: state.annotationColor, points: [[x, y]] };
    try { svg.setPointerCapture(ev.pointerId); } catch (_) {}
    requestAnnRepaint();
  } else if (phase === "move" && state.annotationDrawing) {
    const pts = state.annotationDrawing.points;
    const last = pts[pts.length - 1];
    if (Math.hypot(x - last[0], y - last[1]) < 0.002) return;
    pts.push([x, y]);
    if (pts.length > 256) pts.splice(0, pts.length - 256);
    requestAnnRepaint();
  } else if (phase === "up" && state.annotationDrawing) {
    state.annotationStrokes = [...(state.annotationStrokes || []), state.annotationDrawing];
    state.annotationDrawing = null;
    if (state.annotationStrokes.length > 50) state.annotationStrokes = state.annotationStrokes.slice(-50);
    // Full render only on commit so the toolbar's "N nét" counter updates.
    render();
  }
};

function auditBadge(action) {

  if (action.startsWith("comment.")) return "💬";
  return "•";
}
function auditColor(action) {
  if (action.includes("deleted") || action.includes("archived")) return "#ef4d57";
  if (action.includes("restored") || action.includes("created") || action.includes("login")) return "#35c389";
  if (action.includes("update") || action.includes("edited") || action.includes("role")) return "#f5a623";
  return "#2da8e2";
}

}

function qualityMenu(vals) {

      ${vals.qualities.map((q) => `
        <div data-act="setQuality" data-arg="${q.id}" class="co-hover" style="display:flex;align-items:center;gap:11px;padding:10px;border-radius:9px;cursor:pointer;background:${q.rowBg};">

                ${c.menuOpen ? `
                  <div style="position:absolute;right:0;top:calc(100% + 6px);width:148px;background:var(--co-menu);border:1px solid var(--co-border-2);border-radius:10px;padding:6px;box-shadow:0 18px 40px rgba(0,0,0,0.4);z-index:5;">
                    <button data-act="startEditComment" data-arg="${c.id}" class="co-hover" style="width:100%;text-align:left;background:transparent;border:none;border-radius:8px;padding:8px 9px;color:var(--co-text);font-weight:700;font-size:12px;cursor:pointer;">Chỉnh sửa</button>
                    <button data-act="deleteComment" data-arg="${c.id}" class="co-hover" style="width:100%;text-align:left;background:transparent;border:none;border-radius:8px;padding:8px 9px;color:#ef4d57;font-weight:700;font-size:12px;cursor:pointer;">Xóa comment</button>

              <button data-act="toggleResolve" data-arg="${c.id}" title="Đánh dấu xong" style="width:26px;height:26px;display:grid;place-items:center;border-radius:7px;border:1px solid ${c.resolveBorder};background:${c.resolveBg};color:${c.resolveColor};cursor:pointer;">${ICON.check}</button>
            </div>

                <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px;">
                  <button data-act="cancelEditComment" class="co-border-hover" style="background:var(--co-panel-2);border:1px solid var(--co-border-2);color:var(--co-text-2);font-weight:700;font-size:12px;padding:7px 11px;border-radius:8px;cursor:pointer;">Hủy</button>
                  <button data-act="saveEditComment" data-arg="${c.id}" class="co-btn-blue" style="background:#2da8e2;border:none;color:#07111a;font-weight:800;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;">Lưu</button>
                </div>
              </div>
            ` : `<div style="margin-top:9px;font-size:13px;line-height:1.55;color:var(--co-comment);${c.contentStyle}">${esc(c.content)}</div>`}

              </div>

        ${vals.emptyState ? `

          <span id="commentAttachLabel" style="font-weight:700;font-size:11.5px;color:${vals.attachIcon};font-variant-numeric:tabular-nums;">${esc(vals.attachLabel)}</span>

          <textarea id="commentInput" placeholder="Thêm comment tại timecode hiện tại…  ( ⌘↵ để gửi )" rows="2" style="flex:1;resize:none;background:var(--co-panel);border:1px solid var(--co-border-2);border-radius:10px;padding:10px 12px;color:var(--co-text);font-size:13px;line-height:1.45;outline:none;min-height:44px;">${esc(state.newComment)}</textarea>

        </div>
      </div>
    </aside>`;
}

  return `

    <div data-stop="1" style="width:100%;max-width:620px;background:var(--co-panel);border:1px solid var(--co-border-2);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,0.6);overflow:hidden;">

        </div>
        <button data-act="closeTranscode" class="co-attach-hover" style="margin-left:auto;width:34px;height:34px;display:grid;place-items:center;background:var(--co-hover);border:none;border-radius:9px;color:var(--co-text-2);cursor:pointer;flex:0 0 34px;">${ICON.x}</button>
      </div>
      <div style="padding:18px 22px 22px;">
        ${vals.ladder.map((l) => `
          <div style="display:flex;align-items:center;gap:14px;padding:14px;border-radius:12px;margin-bottom:8px;background:${l.rowBg};border:1px solid ${l.rowBorder};">
            <div style="width:46px;height:46px;border-radius:11px;background:${l.iconBg};display:grid;place-items:center;flex:0 0 46px;color:${l.iconColor};font-weight:800;font-size:12px;">${esc(l.badge)}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:14px;color:var(--co-text);">${esc(l.label)} <span style="color:var(--co-faint);font-weight:600;font-size:12px;">${esc(l.res)}</span></div>
              <div style="color:var(--co-muted);font-size:12px;font-weight:600;margin-top:2px;">${esc(l.detail)}</div>
              ${l.isProcessing ? `<div style="height:5px;border-radius:999px;background:var(--co-border-2);margin-top:8px;overflow:hidden;"><div style="width:${l.progress}%;height:100%;background:linear-gradient(90deg,#f5a623,#ffcb6b);"></div></div>` : ""}
            </div>
            <div style="flex:0 0 auto;">
              <span style="display:inline-block;font-size:11px;font-weight:700;color:${l.tagColor};background:${l.tagBg};padding:6px 11px;border-radius:999px;">${esc(l.tag)}</span>
              ${l.canRequest ? `<button data-act="requestTranscode" data-arg="${l.id}" class="co-btn-blue" style="display:block;margin-top:7px;background:#2da8e2;border:none;color:#07111a;font-weight:700;font-size:11.5px;padding:6px 12px;border-radius:999px;cursor:pointer;width:100%;">Tạo proxy</button>` : ""}
            </div>
          </div>
        `).join("")}
        <div style="margin-top:12px;display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(45,168,226,0.08);border:1px solid rgba(45,168,226,0.18);border-radius:11px;">
          ${ICON.info}<div style="font-size:12px;color:var(--co-text-2);font-weight:600;line-height:1.5;">HLS segment 4s · h.264 · AAC 128–192kbps. Worker dùng FFmpeg (NVENC nếu có GPU). Proxy lưu trên SSD cache, không đọc lại từ NAS mỗi lần phát.</div>
        </div>
      </div>
    </div>
  </div>`;

function computeVals() {
  const s = state;
  const A = AUTHORS;
  const { cur, prog } = sceneAt(s.currentMs);

  const allSources = Object.values(s.sourcesByProject).flat();
  const selSrc = allSources.find((x) => x.id === s.selectedId) || allSources[0];
  // Empty-project placeholder: when the user is logged in but the workspace has
  // no projects yet (fresh install, all archived, etc.), render() needs a
  // non-null object to walk so downstream code doesn't crash with "undefined.id".
  const EMPTY_PROJECT = { id: "", name: "—", status: "progress", client: "", team: [], updated: "" };
  const selProject = PROJECTS.find((p) => p.id === s.selectedProjectId) || EMPTY_PROJECT;
  const projStatus = effStatus(selProject);

  const counts = { all: PROJECTS.length, progress: 0, done: 0, published: 0 };
  PROJECTS.forEach((p) => { counts[effStatus(p)]++; });
  const searchNeedle = (s.workspaceSearch || "").trim().toLowerCase();
  const navDefs = [
    { key: "all", label: "Tất cả", dot: "#8896ab" },
    { key: "progress", label: "Đang thực hiện", dot: SM.progress.color },
    { key: "done", label: "Đã xong", dot: SM.done.color },
    { key: "published", label: "Đã đăng", dot: SM.published.color },
  ];
  const statusNav = navDefs.map((n) => {
    const active = s.view === "projects" && s.statusFilter === n.key;
    return { ...n, count: counts[n.key],
      bg: active ? "rgba(45,168,226,0.13)" : "transparent",
      color: active ? "var(--co-text)" : "var(--co-muted)",
      countColor: active ? "var(--co-accent-ink)" : "var(--co-faint)" };
  });

  const order = ["progress", "done", "published"];
  const clientValues = Array.from(new Set(PROJECTS.map((p) => p.client))).sort((a, b) => a.localeCompare(b, "vi"));
  const mapProject = (p) => {
    const srcs = s.sourcesByProject[p.id] || [];
    const nReady = srcs.filter((x) => x.status === "ready").length;
    const nComments = srcs.reduce((a, x) => a + (x.comments || 0), 0);
    const est = effStatus(p);
    const sm = SM[est];
    const first = srcs[0] || { a: "#15171c", b: "#3a4453" };
    return {
      ...p, statusLabel: sm.label, statusColor: sm.color,
      cover: "linear-gradient(150deg," + first.a + "," + first.b + ")",
      thumbs: srcs.slice(0, 4).map((x) => "linear-gradient(160deg," + x.a + "," + x.b + ")"),
      nSources: srcs.length, nComments,
      pct: srcs.length ? Math.round((nReady / srcs.length) * 100) : 0,
      readyLabel: nReady + "/" + srcs.length + " nguồn có proxy",
      isProgress: est === "progress",
      team: p.team.map((t) => ({ initial: t[0], color: t[1] })),
    };
  };
  const visibleProjects = PROJECTS.filter((p) => {
    if (s.clientFilter !== "all" && p.client !== s.clientFilter) return false;
    if (!searchNeedle) return true;
    return [p.name, p.client].some((value) => String(value || "").toLowerCase().includes(searchNeedle));
  });
  const projectGroups = order.filter((k) => s.statusFilter === "all" || s.statusFilter === k).map((k) => ({
    key: k, label: SM[k].label, color: SM[k].color,
    showHeader: s.statusFilter === "all",
    count: counts[k],
    projects: visibleProjects.filter((p) => effStatus(p) === k).map(mapProject),
  })).filter((g) => g.projects.length > 0);
  const filterTitle = s.statusFilter === "all" ? "Tất cả project" : SM[s.statusFilter].label;
  const clientOptions = [{ value: "all", label: "Tất cả client", selected: s.clientFilter === "all" }]
    .concat(clientValues.map((client) => ({ value: client, label: client, selected: s.clientFilter === client })));
  const selectedProjectMembers = (window.__projectMembersByProject && window.__projectMembersByProject[s.selectedProjectId]) || [];
  const roleLabel = { owner: "Owner", editor: "Editor", reviewer: "Reviewer", client: "Client" };
  const projectMembers = selectedProjectMembers.map((member) => {
    const user = member.user || {};
    return {
      projectId: member.projectId,
      userId: member.userId,
      role: member.role,
      name: user.name || member.userId,
      initial: user.initial || (user.name || "?").charAt(0).toUpperCase(),
      color: user.color || "#2da8e2",
      meta: user.email || "Thành viên project",
      badge: roleLabel[member.role] || member.role,
      badgeBg: member.role === "owner" ? "rgba(45,168,226,0.16)" : member.role === "client" ? "rgba(53,195,137,0.16)" : "var(--co-hover)",
      badgeColor: member.role === "owner" ? "#2da8e2" : member.role === "client" ? "#35c389" : "var(--co-text-2)",
      roleOptions: ["owner", "editor", "reviewer", "client"].map((value) => ({ value, label: roleLabel[value], selected: value === member.role })),
    };
  });
  const existingMemberIds = new Set(projectMembers.map((member) => member.userId));
  const memberInviteOptions = Object.values(remote.users || {})
    .filter((user) => !existingMemberIds.has(user.id))
    .map((user) => ({ value: user.id, label: user.name + (user.email ? " · " + user.email : ""), selected: user.id === s.inviteUserId }));
  const memberRoleOptions = ["reviewer", "editor", "client"].map((value) => ({ value, label: roleLabel[value], selected: value === s.inviteRole }));
  const inviteReady = !!s.inviteUserId;

  const projSources = s.sourcesByProject[s.selectedProjectId] || [];
  const sources = projSources.map((src, i) => {
    const st = SRC_STATUS[src.status];
    const resLabel = src.resolutionLabel || (src.height >= 2160 || src.width >= 3840 ? "4K" : src.height >= 1080 ? "Full HD" : src.height >= 720 ? "HD" : "");
    const metaParts = [src.codec];
    if (resLabel) metaParts.push(resLabel);
    metaParts.push(fmtDur(src.dur), src.size);
    return {
      id: src.id, pos: String(i + 1).padStart(2, "0"), title: src.title,
      bg: "linear-gradient(150deg," + src.a + "," + src.b + ")",
      durLabel: fmtDur(src.dur),
      meta: metaParts.join(" · "),
      // Even while proxy is being transcoded, the original is playable via
      // /assets/:id/source — say so instead of the alarming "đang chờ worker".
      statusLabel: src.status === "processing" ? ((src.progress || 0) > 0 ? ("Proxy " + (src.progress || 0) + "% · bản gốc sẵn sàng") : "Đang tạo proxy · bản gốc sẵn sàng") : st.label,
      statusColor: st.color, statusBg: st.bg, comments: src.comments,
      dragOpacity: s.dragId === src.id ? 0.4 : 1,
      rowBorder: s.dragId === src.id ? "rgba(45,168,226,0.6)" : "var(--co-border)",
    };
  });
  const nProjReady = projSources.filter((x) => x.status === "ready").length;
  const nProjComments = projSources.reduce((a, x) => a + (x.comments || 0), 0);

  const statusOptions = order.map((k) => ({
    key: k, label: SM[k].label, color: SM[k].color,
    labelColor: k === projStatus ? "#2da8e2" : "var(--co-text)",
    rowBg: k === projStatus ? "rgba(45,168,226,0.1)" : "transparent",
  }));

  // "source" = play the original NAS file directly (no transcode). This is the
  // default playback URL — we surface it in the quality menu so the user can
  // see what is playing and explicitly pin to it when they want full quality
  // (e.g. 4K) instead of a proxy.
  const SOURCE_QUALITY = { id: "source", label: "Bản gốc", res: "Original", bitrate: "Full quality", sub: "Phát trực tiếp file NAS · không chờ proxy", status: "ready" };
  const qualityList = [SOURCE_QUALITY, ...s.qualities];
  const activeQ = qualityList.find((q) => q.id === s.quality) || qualityList[0];
  const selectedSrc = selSrc || selectedSource();
  const sourceResLabel = selectedSrc && selectedSrc.resolutionLabel
    ? selectedSrc.resolutionLabel
    : (selectedSrc && (selectedSrc.height >= 2160 || selectedSrc.width >= 3840) ? "4K" : selectedSrc && selectedSrc.height >= 1080 ? "Full HD" : selectedSrc && selectedSrc.height >= 720 ? "HD" : "Source");
  const sourceResText = selectedSrc && selectedSrc.width && selectedSrc.height
    ? (selectedSrc.width + "×" + selectedSrc.height)
    : "Nguồn gốc";
  const qualities = qualityList.map((q) => {
    const isActive = q.id === s.quality;
    let tag = "Sẵn sàng", tagColor = "#35c389", tagBg = "rgba(53,195,137,0.14)";
    if (q.id === "source") { tag = "Bản gốc"; tagColor = "#ef4d57"; tagBg = "rgba(239,77,87,0.16)"; }
    else if (q.status === "processing") { tag = (q.progress || 0) > 0 ? ((q.progress || 0) + "%") : "Đang tạo proxy"; tagColor = "#f5a623"; tagBg = "rgba(245,166,35,0.14)"; }
    else if (q.status === "pending") { tag = "Tạo proxy"; tagColor = "#2da8e2"; tagBg = "rgba(45,168,226,0.14)"; }
    return { ...q, isActive, labelColor: isActive ? "#2da8e2" : "var(--co-text)",
      rowBg: isActive ? "rgba(45,168,226,0.1)" : "transparent", tag, tagColor, tagBg };
  });
  const ladderSource = { badge: sourceResLabel || "SRC", label: "Source", res: sourceResText, detail: (selectedSrc ? selectedSrc.codec + " · " + selectedSrc.size : "Video source trên NAS"), status: "nas" };
  const ladder = [ladderSource, ...s.qualities].map((l) => {
    let tag, tagColor, tagBg, canRequest = false, isProcessing = false;
    if (l.status === "nas") { tag = "NAS only"; tagColor = "#8896ab"; tagBg = "var(--co-border)"; }
    else if (l.status === "ready") { tag = "Sẵn sàng"; tagColor = "#35c389"; tagBg = "rgba(53,195,137,0.14)"; }
    else if (l.status === "processing") { tag = (l.progress || 0) > 0 ? ((l.progress || 0) + "%") : "Đang chờ"; tagColor = "#f5a623"; tagBg = "rgba(245,166,35,0.14)"; isProcessing = true; }
    else { tag = "Chưa tạo"; tagColor = "#8896ab"; tagBg = "var(--co-border)"; canRequest = true; }
    const isSrc = l.status === "nas";
    return { id: l.id, badge: l.badge || l.label.replace("p", ""), label: l.label, res: l.res,
      detail: l.detail || ("h.264 · " + l.bitrate + " · HLS 4s segment · " + l.sub),
      tag, tagColor, tagBg, canRequest, isProcessing, progress: l.progress || 0,
      iconBg: isSrc ? "rgba(239,77,87,0.14)" : "rgba(45,168,226,0.14)",
      iconColor: isSrc ? "#ef4d57" : "#2da8e2",
      rowBg: isSrc ? "rgba(239,77,87,0.05)" : "var(--co-hover)",
      rowBorder: isSrc ? "rgba(239,77,87,0.18)" : "var(--co-border)" };
  });

  const mapComment = (c) => {
    const au = A[c.who] || A.me;
    return { id: c.id, color: au.color, initial: au.initial, name: au.name,
      roleTag: au.role, roleColor: au.role ? "#35c389" : "transparent",
      content: c.content, ago: c.ago, resolved: c.resolved,
      tcLabel: fmtTc(c.ms), ms: c.ms, leftPct: (c.ms / s.duration) * 100,
      cardBg: c.resolved ? "rgba(255,255,255,0.015)" : "var(--co-panel)",
      cardBorder: c.resolved ? "var(--co-hover)" : "var(--co-border)",
      contentStyle: c.resolved ? "opacity:.5;text-decoration:line-through;text-decoration-color:rgba(255,255,255,0.25)" : "",
      resolveBg: c.resolved ? "#35c389" : "transparent",
      resolveColor: c.resolved ? "#07090e" : "#5d6b82",
      resolveBorder: c.resolved ? "#35c389" : "var(--co-border-2)",
      menuOpen: s.commentMenuId === c.id,
      isEditing: s.editingCommentId === c.id,
      editingText: s.editingCommentId === c.id ? s.editingCommentText : c.content,
      hasReplies: c.replies && c.replies.length > 0,
      replies: (c.replies || []).map((r) => ({ name: (A[r.who] || A.me).name, color: (A[r.who] || A.me).color, content: r.content })) };
  };
  const sorted = [...s.comments].sort((a, b) => a.ms - b.ms);
  const all = sorted.map(mapComment);
  const countAll = all.length, countOpen = all.filter((c) => !c.resolved).length, countDone = all.filter((c) => c.resolved).length;
  let visible = all;
  if (s.filter === "open") visible = all.filter((c) => !c.resolved);
  else if (s.filter === "done") visible = all.filter((c) => c.resolved);
  const markers = all.map((c) => ({ ms: c.ms, leftPct: c.leftPct, color: c.color, markerBg: c.resolved ? "var(--co-panel-2)" : c.color, markerDot: c.resolved ? c.color : "#07090e", tip: c.name + " · " + c.tcLabel }));

  const thumbs = [];
  for (let i = 0; i < 18; i++) {
    thumbs.push({ bg: selectedSrc && selectedSrc.posterUrl ? `center/cover no-repeat url(${selectedSrc.posterUrl})` : "linear-gradient(160deg,#1c2432,#334861)" });
  }

  const tabBg = (on) => on ? "#2da8e2" : "transparent";
  const tabColor = (on) => on ? "#07111a" : "#8896ab";

  const remoteVersions = (window.__versionsByAsset && window.__versionsByAsset[s.selectedId]) || null;
  const versions = (remoteVersions || EMPTY_VERSIONS).map((v, index, arr) => {
    const id = v.id;
    const label = v.label || ("V" + v.versionNumber);
    const note = v.note || (index === arr.length - 1 ? "current" : "");
    return {
      id,
      label,
      note,
      meta: v.meta || ((remote.users && remote.users[v.authorUserId] ? remote.users[v.authorUserId].name : "Editor") + " · vừa qua"),
      tag: v.tag || "Ready",
      bg: v.bg || "linear-gradient(135deg,#1c5876,#2da8e2)",
      labelColor: id === s.version ? "#2da8e2" : "var(--co-text)",
      rowBg: id === s.version ? "rgba(45,168,226,0.1)" : "transparent",
      tagColor: "#35c389",
      tagBg: "rgba(53,195,137,0.14)",
    };
  });

  // NAS browser
  let crumbs, folderLabel, nasList;
  const listing = REMOTE_NAS || { path: "/", crumbs: [{ label: "/", path: "/" }], entries: [] };
  crumbs = (listing.crumbs || [{ label: "/", path: "/" }])
    .filter((cr) => !(cr.path === "/" && cr.label === "/"))
    .map((cr) => ({ label: cr.label, path: cr.path }));
  folderLabel = listing.path || "/";
  nasList = (listing.entries || []).map((ch) => {
    if (ch.type === "folder") {
      return {
        isFolder: true,
        isFile: false,
        name: ch.name,
        navArg: encodeURIComponent(ch.path),
        meta: typeof ch.childCount === "number" ? (ch.childCount + " mục") : "Folder",
      };
    }
    const id = ch.path;
    const on = !!s.importSel[id];
    return {
      isFolder: false,
      isFile: true,

// ---- event delegation ----
document.addEventListener("click", (e) => {
  let n = e.target;
  while (n && n !== document) {
    if (n.dataset && n.dataset.stop) { /* allow inner clicks but stop bubbling further */ }
    if (n.dataset && n.dataset.act) {
      const act = n.dataset.act;
      const arg = n.dataset.arg;
      e.stopPropagation();
      handleAct(act, arg, e, n);
      return;
    }
    n = n.parentNode;
  }
});

function handleAct(act, arg, e, node) {
  switch (act) {
    case "goProjects": return goProjects();
    case "openProject": return openProject(arg);
    case "openSelProject": return openProject(state.selectedProjectId);

const API_BASE = (function () {
  const m = document.querySelector('meta[name="api-base"]');
  if (m && m.content) return m.content.replace(/\/+$/, "");
  // dev default: API on 4000, FE on 3000
  if (location.port === "3000") return location.protocol + "//" + location.hostname + ":4000";
  return "/api";
})();

function apiMediaUrl(path) {
  return API_BASE + path;
}

// Decide the <video src=…> URL: "source" (default) → raw NAS file, otherwise
// look for an HLS master from the picked rendition. Falls back to source if
// the chosen proxy isn't ready yet (so the player never goes blank).
function pickPlaybackUrl(src, quality) {
  if (!src || !src.playbackUrl) return "";
  if (!quality || quality === "source") return src.playbackUrl;
  const versionId = state._currentVersionId;
  const rends = (versionId && REMOTE_RENDITIONS && REMOTE_RENDITIONS[versionId]) || [];
  const targetH = quality === "540p" ? 540 : quality === "720p" ? 720 : quality === "1080p" ? 1080 : 0;
  const r = rends.find((x) => x.height === targetH);
  if (r && r.status === "ready" && r.hlsMasterUrl) {
    // hlsMasterUrl is "/hls/<rid>/master.m3u8" — proxied through the API.
    return apiMediaUrl(r.hlsMasterUrl);
  }
  return src.playbackUrl;
}

async function api(path, opts) {
  const res = await fetchWithTimeout(API_BASE + path, opts);
  const text = await res.text();
  let json = {};
  if (text) { try { json = JSON.parse(text); } catch (_) { json = { error: text.slice(0, 200) }; } }
  if (res.status === 401) {
    // Probing /me as part of bootstrap is expected to return 401 when not logged in —
    // surface a generic flag, not a noisy message. Login endpoints get the real DSM error.
    const isLoginPath = path.indexOf("/auth/") === 0;
    remote.me = null;
    throw Object.assign(new Error(isLoginPath ? (json.error || "Sai tài khoản hoặc mật khẩu") : "unauthorized"), { status: 401, body: json });
  }
  if (!res.ok) throw Object.assign(new Error(json.error || ("HTTP " + res.status)), { status: res.status, body: json });
  return json;
}

async function apiPublic(path, opts) {
  const res = await fetchWithTimeout(API_BASE + path, opts);
  const text = await res.text();
  const json = text ? JSON.parse(text) : {};
  if (!res.ok) throw Object.assign(new Error(json.error || ("HTTP " + res.status)), { status: res.status, body: json });
  return json;
}

async function fetchWithTimeout(url, opts) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), API_FETCH_TIMEOUT_MS);
  try {
    return await fetch(url, {
      credentials: "include",
      headers: { "content-type": "application/json", ...(opts && opts.headers) },
      method: (opts && opts.method) || "GET",
      body: opts && opts.body ? JSON.stringify(opts.body) : undefined,
      signal: controller.signal,
    });
  } catch (err) {
    if (err && err.name === "AbortError") throw new Error("Yeu cau qua lau, vui long thu lai");
    throw err;
  } finally {
    clearTimeout(timer);
  }
}

// ---- live version watchdog -------------------------------------------------
// Tab kept open across deploys is the #1 cache pain: the browser respects our
// no-store headers for index.html, but the *already-loaded* JS keeps running
// indefinitely. So on every deploy we want the live tab to detect "running
// SHA != server SHA" and reload itself with a cache-busting query string.
//
// Two anchors:
//   - window.__BUILD_SHA: stamped by dev-server.js at request time. This is
//     what the *currently running* JS was served with.
//   - /api/version .sha: the API container's BUILD_SHA, refreshed each pull.
// If the two diverge we reload.
const BOOT_SHA = (window.__BUILD_SHA || "unknown");
let _versionPollTimer = null;
let _reloadingForUpdate = false;
async function checkServerVersion() {
  if (_reloadingForUpdate) return;
  try {
    const meta = await apiPublic("/version");
    const remoteSha = meta && meta.sha ? String(meta.sha) : "";
    // Ignore the "unknown" sentinel — happens locally / on first build before
    // CI args land. Only act when both sides report a real hash and they
    // disagree.
    if (!remoteSha || remoteSha === "unknown" || BOOT_SHA === "unknown") return;
    if (remoteSha.slice(0, 12) === BOOT_SHA.slice(0, 12)) return;
    _reloadingForUpdate = true;
    showUpdateReloadBanner(remoteSha);
    // Give the user 4s to see the banner, then hard-reload with a cache-bust
    // query string so even an aggressive intermediary doesn't replay the old
    // HTML. Using location.replace + ?v=… is the most reliable cross-browser
    // way to bypass bfcache + disk cache.
    setTimeout(() => {
      try { localStorage.removeItem("co-stale"); } catch (_) {}
      const u = new URL(window.location.href);
      u.searchParams.set("v", remoteSha.slice(0, 12));
      window.location.replace(u.toString());
    }, 4000);
  } catch (_) { /* ignore — try again next tick */ }
}
function showUpdateReloadBanner(remoteSha) {
  if (document.getElementById("coopUpdateBanner")) return;
  const el = document.createElement("div");
  el.id = "coopUpdateBanner";
  el.style.cssText = "position:fixed;left:50%;top:14px;transform:translateX(-50%);z-index:9999;background:#2da8e2;color:#07111a;font-weight:800;font-size:13px;padding:11px 18px;border-radius:999px;box-shadow:0 10px 30px rgba(45,168,226,0.45);display:flex;align-items:center;gap:10px;";
  el.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#07111a;"></span>Có bản cập nhật mới — đang tải lại trong giây lát…';
  document.body.appendChild(el);
}
function startVersionWatchdog() {
  if (_versionPollTimer) return;
  // First check on next tick (so /me resolves first), then every 60s. Also
  // re-check whenever the tab becomes visible again — common case: user
  // leaves a tab open overnight, NAS auto-updates, user comes back.
  setTimeout(checkServerVersion, 1500);
  _versionPollTimer = setInterval(checkServerVersion, 60_000);
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") checkServerVersion();
  });
}

async function bootstrap() {
  startVersionWatchdog();
  // Update the boot loading hint so user sees progress instead of staring at a static spinner.
  const setHint = (msg) => { const el = document.getElementById("bootHint"); if (el) el.textContent = msg; };
  setHint("Kiểm tra cấu hình máy chủ…");
  try {
    const status = await apiPublic("/setup/status");
    remote.setup = status || { configured: true };
    remote.connected = true; // setup/status succeeded → API reachable
    if (status && status.configured === false) {
      if (status.publicUrl) setup.publicUrl = status.publicUrl;
      if (status.dsmHost) setup.dsmHost = status.dsmHost;
      if (status.dsmMountRoot) setup.dsmMountRoot = status.dsmMountRoot;
      if (status.updater && status.updater.feedUrl) setup.updateFeedUrl = status.updater.feedUrl;
      if (status.updater && status.updater.triggerUrl) setup.updateTriggerUrl = status.updater.triggerUrl;
      if (status.updater && status.updater.pollIntervalSeconds) setup.updatePollIntervalSeconds = status.updater.pollIntervalSeconds;
      render();
      return;
    }
  } catch (err) {
    remote.error = err.message;
    remote.connected = false;
  }
  // 1. Probe /me. If reachable + authed → load from API. If 401 → show login. If unreachable → connection-error overlay.
  setHint("Xác thực phiên…");
  try {
    const r = await api("/me");
    remote.connected = true; remote.me = r.user;
    setHint("Tải dữ liệu…");
    await loadRemote();
  } catch (err) {
    if (err.status === 401) { remote.connected = true; remote.me = null; }
    else { remote.connected = false; remote.error = err.message; }
  }
  render();
  // Auto-retry connection in background when offline so user doesn't have to refresh manually
  // after a transient outage or while api/postgres are still warming up post-deploy.
  if (!remote.connected) scheduleBootRetry();
}

let _bootRetryTimer = null;
async function tryBootProbe() {
  try {
    const status = await apiPublic("/setup/status");
    remote.setup = status || { configured: true };
    remote.connected = true; remote.error = null;
    if (status && status.configured === false) {
      if (status.publicUrl) setup.publicUrl = status.publicUrl;
      if (status.dsmHost) setup.dsmHost = status.dsmHost;
      if (status.dsmMountRoot) setup.dsmMountRoot = status.dsmMountRoot;
      if (status.updater && status.updater.feedUrl) setup.updateFeedUrl = status.updater.feedUrl;
      if (status.updater && status.updater.triggerUrl) setup.updateTriggerUrl = status.updater.triggerUrl;
      if (status.updater && status.updater.pollIntervalSeconds) setup.updatePollIntervalSeconds = status.updater.pollIntervalSeconds;
      render();
      return;
    }
    try {
      const r = await api("/me");
      remote.me = r.user;
      await loadRemote();
    } catch (e) {
      if (e.status === 401) { remote.me = null; }
      else { remote.connected = false; remote.error = e.message; }
    }
    render();
    if (!remote.connected) scheduleBootRetry();
  } catch (e) {
    remote.error = e.message;
    remote.connected = false;
    render();
    scheduleBootRetry();
  }
}
function scheduleBootRetry() {
  if (_bootRetryTimer) return;
  _bootRetryTimer = setTimeout(() => { _bootRetryTimer = null; tryBootProbe(); }, 5000);
}

async function loadRemote() {

// Realtime transport: try WebSocket first; fall back to SSE (EventSource).
// WS gives bidirectional channel (presence heartbeat goes over the same socket → fewer requests).
let eventSource = null;
let eventWs = null;
let wsHeartbeatTimer = null;

function normalizeUpdateStatusPayload(payload) {
  const body = payload && typeof payload === "object" ? payload : {};
  const local = body.local || {
    version: body.version || "không rõ",
    summary: body.summary || (body.localSha || body.sha ? "Bản API này chưa xuất release metadata đầy đủ." : "Chưa đọc được metadata bản đang chạy."),
    changes: Array.isArray(body.changes) ? body.changes : [],
    sha: body.localSha || body.sha || "unknown",
    builtAt: body.localBuiltAt || body.builtAt || "unknown",
    publishedAt: body.publishedAt || null,
  };
  const remote = body.remote || ((body.remoteSha || body.remoteVersion || body.remoteSummary) ? {
    version: body.remoteVersion || "không rõ",
    summary: body.remoteSummary || "Đã phát hiện metadata bản mới từ update feed.",
    changes: Array.isArray(body.remoteChanges) ? body.remoteChanges : [],
    publishedAt: body.remotePublishedAt || null,
    builtAt: body.remoteBuiltAt || null,
    sha: body.remoteSha || "unknown",
  } : null);
  const updateAvailable = typeof body.updateAvailable === "boolean"
    ? body.updateAvailable
    : !!(remote && local && remote.sha && local.sha && remote.sha !== "unknown" && local.sha !== "unknown" && remote.sha.slice(0, 7) !== local.sha.slice(0, 7));
  return {
    ...body,
    local,
    remote,
    updateAvailable,
    checkAvailable: typeof body.checkAvailable === "boolean" ? body.checkAvailable : !!(body.remoteSha || remote),
    triggerAvailable: typeof body.triggerAvailable === "boolean" ? body.triggerAvailable : false,
    pollIntervalSeconds: body.pollIntervalSeconds || (remote && remote.pollIntervalSeconds) || setup.updatePollIntervalSeconds || 900,
  };
}

function normalizeNasErrorMessage(message) {
  const text = String(message || "").trim();
  if (!text) return "Không đọc được NAS";
  if (/FileStation list_share failed/i.test(text)) {
    return "Không đọc được danh sách Shared Folder từ DSM. App sẽ thử fallback qua thư mục NAS đã mount; nếu vẫn lỗi, kiểm tra lại DSM mount root.";
  }
  if (/Khong tim thay thu muc NAS da mount/i.test(text) || /Không tìm thấy thư mục NAS đã mount/i.test(text)) return text;
  if (/DSM request timed out/i.test(text)) return "DSM phản hồi quá chậm. Kiểm tra kết nối Tailscale/DNS tới NAS rồi thử lại.";
  return text;
}

function openEventStream() {
  if (eventWs || eventSource) return;
  const wsBase = API_BASE.startsWith("http")
    ? API_BASE.replace(/^http/, "ws")
    : location.origin.replace(/^http/, "ws") + API_BASE;
  const wsUrl = wsBase.replace(/\/+$/, "") + "/ws";
  try {
    eventWs = new WebSocket(wsUrl);
    let wsOpened = false;
    eventWs.onopen = () => {
      wsOpened = true;
      // Replace HTTP presence heartbeat with WS messages (cheaper).
      wsHeartbeatTimer = setInterval(() => {
        try { eventWs.send(JSON.stringify({ type: "presence", focus: currentFocus() })); } catch (_) {}
      }, 25_000);
    };
    eventWs.onmessage = (ev) => { try { handleRemoteEvent(JSON.parse(ev.data)); } catch (_) {} };
    eventWs.onerror = () => { /* close handler will fall back */ };
    eventWs.onclose = () => {
      if (wsHeartbeatTimer) { clearInterval(wsHeartbeatTimer); wsHeartbeatTimer = null; }
      eventWs = null;
      if (!wsOpened) openSseStream(); // upgrade never succeeded → SSE fallback
    };
  } catch (_) {
    openSseStream();
  }
}
function openSseStream() {
  if (eventSource) return;
  try {
    eventSource = new EventSource(API_BASE + "/events", { withCredentials: true });
    eventSource.onmessage = (ev) => { try { handleRemoteEvent(JSON.parse(ev.data)); } catch (_) {} };
    eventSource.onerror = () => { /* browser auto-retries */ };
  } catch (_) {}
}
function closeEventStream() {
  if (eventWs) { try { eventWs.close(); } catch (_) {} eventWs = null; }
  if (wsHeartbeatTimer) { clearInterval(wsHeartbeatTimer); wsHeartbeatTimer = null; }
  if (eventSource) { eventSource.close(); eventSource = null; }
}

  const payload = {

    dsmHost: readValue("setupDsmHost"),

    },
    transcode: {

      codecLadder: readValue("setupCodecLadder") || "h264",
      hwaccel: readValue("setupHwaccel"),
      autoscaleThreshold: readNumber("setupAutoscaleThreshold", 5),
      autoscaleStep: readNumber("setupAutoscaleStep", 1),
      maxConcurrency: readNumber("setupMaxConcurrency", 3),
    },
    updater: {
      feedUrl: readValue("setupUpdateFeedUrl"),
      triggerUrl: readValue("setupUpdateTriggerUrl"),
      triggerToken: readValue("setupUpdateTriggerToken"),
      pollIntervalSeconds: readNumber("setupUpdatePollIntervalSeconds", 900),
    },
  };
  Object.assign(setup, {
    publicUrl: payload.publicUrl,
    dsmHost: payload.dsmHost,
    dsmMountRoot: payload.dsmMountRoot,
    dsmDevLogin: payload.dsmDevLogin,
    dsmInsecure: payload.dsmInsecure,
    workerConcurrency: payload.transcode.workerConcurrency,
    codecLadder: payload.transcode.codecLadder,
    hwaccel: payload.transcode.hwaccel,
    autoscaleThreshold: payload.transcode.autoscaleThreshold,
    autoscaleStep: payload.transcode.autoscaleStep,
    maxConcurrency: payload.transcode.maxConcurrency,
    smtpUrl: payload.smtp.url,
    smtpFrom: payload.smtp.from,
    slackWebhookUrl: payload.webhooks.slackWebhookUrl,
    discordWebhookUrl: payload.webhooks.discordWebhookUrl,
    updateFeedUrl: payload.updater.feedUrl,
    updateTriggerUrl: payload.updater.triggerUrl,
    updateTriggerToken: payload.updater.triggerToken,
    updatePollIntervalSeconds: payload.updater.pollIntervalSeconds,
  });
  setup.error = "";

    await apiPublic("/setup/apply", { method: "POST", body: payload });
    setup.busy = false;

async function pollSetupReady() {
  for (let i = 0; i < 60; i++) {
    await new Promise((resolve) => setTimeout(resolve, 2000));
    try {
      const status = await apiPublic("/setup/status");
      if (status && status.configured) {
        remote.setup = status;
        setup.restarting = false;
        return bootstrap();
      }
    } catch (_) {}
  }
  setup.error = "Đã lưu nhưng API chưa trở lại sau 2 phút. Kiểm tra log container API.";
  setup.restarting = false;
  render();
}

function readValue(id) {
  const el = document.getElementById(id);
  return el ? String(el.value || "").trim() : "";
}

function readChecked(id) {
  const el = document.getElementById(id);
  return !!(el && el.checked);
}

function readNumber(id, fallback) {
  const val = Number.parseInt(readValue(id), 10);
  return Number.isFinite(val) ? val : fallback;
}

async function handleRemoteEvent(ev) {
  if (!ev || !ev.type) return;
  if (ev.type === "presence") { remote.presence = ev.users || []; render(); return; }
  if (ev.type === "rendition") {
    // mirror into client state.qualities if it's the version currently being viewed
    if (state._currentVersionId && ev.assetVersionId === state._currentVersionId) {
      const id = ev.id.split("_").slice(-1)[0]; // "p1s1_v3_720p" -> "720p"
      state.qualities = state.qualities.map((q) => q.id === id ? { ...q, status: ev.status, progress: ev.progress } : q);
    }
    if (ev.projectId && REMOTE_SOURCES[ev.projectId]) await refreshProjectSources(ev.projectId);
    render();
  } else if (ev.type === "asset") {
    // refresh the affected project's sources if we have it loaded
    if (REMOTE_SOURCES[ev.projectId]) { await refreshProjectSources(ev.projectId); render(); }
  } else if (ev.type === "comment") {
    if (state._currentVersionId && ev.comment && ev.comment.assetVersionId === state._currentVersionId) {
      await refreshComments(state._currentVersionId);
      REMOTE_COMMENTS_FOR_SELECTED = REMOTE_COMMENTS[state._currentVersionId];
      render();
    } else if (ev.projectId && ev.projectId !== state.selectedProjectId) {
      state.notificationsByProject[ev.projectId] = (state.notificationsByProject[ev.projectId] || 0) + 1;
      render();
    }
    if (ev.projectId && REMOTE_SOURCES[ev.projectId]) await refreshProjectSources(ev.projectId);
  }
}

function prepareAuditEntries(rawEntries) {
  return rawEntries.map((e) => {
    const dt = e.createdAt ? new Date(e.createdAt) : null;
    const payload = e.payload || {};
    const snippet = payload.snippet ? payload.snippet : (payload.title ? "« " + payload.title + " »" : (payload.role ? "role=" + payload.role : (payload.userName ? "user=" + payload.userName : "")));
    return {
      ...e,
      timeLabel: dt ? dt.toLocaleString("vi-VN", { dateStyle: "short", timeStyle: "short" }) : "",
      payloadSummary: snippet,
    };
  });
}

async function doLogin() {
  if (auth.busy) return;
  // pick up the latest values from the form (so we don't lose what the user typed between renders)
  const acc = document.getElementById("loginAccount"); if (acc) auth.account = acc.value;
  const pw = document.getElementById("loginPasswd"); if (pw) auth.passwd = pw.value;
  const otp = document.getElementById("loginOtp"); if (otp) auth.otp = otp.value;
  if (!auth.account || !auth.passwd) { auth.error = "Nhập tài khoản và mật khẩu"; return render(); }
  auth.busy = true; auth.error = ""; render();
  try {
    const body = { account: auth.account, passwd: auth.passwd };
    if (auth.needsOtp) body.otp_code = auth.otp;
    const r = await api("/auth/dsm/login", { method: "POST", body });
    if (r.needsOtp) {
      auth.needsOtp = true;
      auth.busy = false;
      auth.error = r.error || (r.otpInvalid ? "Mã OTP sai hoặc đã hết hạn — thử mã mới" : "");
      if (r.otpInvalid) auth.otp = ""; // wipe so the input is ready for retype
      return render();
    }
    // Logged in. Dismiss the overlay BEFORE awaiting loadRemote — otherwise the
    // user stares at "Đang xác thực…" for a few seconds while projects/users load,
    // which feels like a hang.
    remote.me = r.user; auth.busy = false; auth.needsOtp = false; auth.passwd = ""; auth.otp = "";
    render();
    loadRemote()
      .then(() => render())
      .catch((err2) => { remote.error = err2 && err2.message; render(); });
  } catch (err) {
    auth.busy = false;
    auth.error = (err && err.message) || "Đăng nhập thất bại";
    auth.otp = ""; // wipe wrong OTP so user can retype cleanly
    render();
  }
}
